# AI Hedgefund Configuration Example

# Trading Parameters
trading:
  mode: backtest  # backtest or live
  symbols:
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - TSLA
  initial_capital: 1000000
  base_currency: USD
  
  # Risk Management
  max_drawdown: 0.20
  risk_per_trade: 0.02
  max_position_size: 0.10
  stop_loss_percent: 0.05
  take_profit_percent: 0.10

# Machine Learning Models
models:
  # Price Prediction
  prediction_model: lstm  # lstm, transformer, xgboost
  prediction_horizon: 5   # days ahead
  lookback_window: 252    # trading days
  confidence_threshold: 0.65
  
  # Risk Model
  risk_model: var  # var, cvar, monte_carlo
  var_percentile: 0.95
  
  # Sentiment Analysis
  sentiment_enabled: true
  sentiment_sources:
    - twitter
    - news
    - reddit

# Data Sources
data:
  # Market Data
  price_feed: yfinance  # yfinance, alpha_vantage, ccxt
  frequency: 1d  # 1m, 5m, 15m, 1h, 1d
  
  # Alternative Data
  news_api_key: ${NEWS_API_KEY}
  twitter_api_key: ${TWITTER_API_KEY}
  
  # Database
  database:
    type: postgresql
    host: localhost
    port: 5432
    name: hedgefund_db
    user: ${DB_USER}
    password: ${DB_PASSWORD}
  
  # Caching
  cache:
    type: redis
    host: localhost
    port: 6379
    ttl: 3600

# Broker Configuration
broker:
  type: alpaca  # alpaca, interactive_brokers, paper
  api_key: ${BROKER_API_KEY}
  api_secret: ${BROKER_API_SECRET}
  base_url: https://paper-api.alpaca.markets
  
  # Order Configuration
  order_type: market  # market, limit
  time_in_force: day  # day, gtc, opg, cls
  commission: 0.001

# Backtesting
backtest:
  start_date: 2020-01-01
  end_date: 2023-12-31
  fee_percentage: 0.001
  slippage_percentage: 0.0005
  warm_up_days: 252
  
  # Metrics
  metrics:
    - sharpe_ratio
    - sortino_ratio
    - max_drawdown
    - win_rate
    - profit_factor

# Monitoring & Logging
monitoring:
  log_level: INFO
  log_file: logs/hedgefund.log
  prometheus_enabled: true
  prometheus_port: 8000
  
  # Alerts
  alerts:
    max_daily_loss: -50000
    max_drawdown: 0.20
    slippage_threshold: 0.01

# API Server
api:
  enabled: true
  host: 0.0.0.0
  port: 8080
  debug: false

# Scheduling
scheduler:
  backtest_frequency: daily
  rebalance_frequency: weekly
  model_retrain_frequency: monthly
